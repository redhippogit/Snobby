<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Snob</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      background: #000;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Subtle glow behind face when speaking */
    .glow {
      position: absolute;
      width: 340px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(180,0,255,0.18) 0%, transparent 70%);
      filter: blur(30px);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    .glow.active { opacity: 1; }

    canvas {
      display: block;
      width: 300px;
      height: 200px;
      border-radius: 36px;
      position: relative;
      z-index: 1;
    }

    .name {
      color: #fff;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 8px;
      margin-top: 28px;
      z-index: 1;
    }

    .status {
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      margin-top: 10px;
      height: 18px;
      z-index: 1;
      transition: color 0.3s;
    }
    .status.active { color: rgba(200,100,255,0.8); }

    /* Mic button */
    .mic-wrap {
      margin-top: 48px;
      z-index: 1;
    }
    .mic-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 30px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
      position: relative;
    }
    .mic-btn::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1.5px solid rgba(180,0,255,0);
      transition: all 0.3s;
    }
    .mic-btn.listening {
      background: rgba(180,0,255,0.2);
      border-color: rgba(180,0,255,0.6);
      box-shadow: 0 0 28px rgba(180,0,255,0.4);
      animation: mic-pulse 1.4s infinite;
    }
    .mic-btn.listening::after {
      border-color: rgba(180,0,255,0.3);
      animation: ring-out 1.4s infinite;
    }
    @keyframes mic-pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }
    @keyframes ring-out {
      0%   { inset:-6px;  opacity:.6; }
      100% { inset:-20px; opacity:0; }
    }

    .mic-label {
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 12px;
      text-align: center;
    }

    /* Settings gear — top right corner */
    .gear {
      position: fixed;
      top: 18px; right: 18px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.2);
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
      transition: color 0.2s;
    }
    .gear:hover { color: rgba(255,255,255,0.5); }

    /* Settings overlay */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 24px;
      backdrop-filter: blur(6px);
    }
    .card {
      background: #111;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%; max-width: 340px;
      color: #fff;
    }
    .card h2 { font-size: 18px; margin-bottom: 8px; }
    .card p  { color: rgba(255,255,255,0.5); font-size: 13px; line-height: 1.6; margin-bottom: 18px; }
    .card a  { color: #b400ff; }
    .key-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 14px;
      color: #fff;
      outline: none;
      margin-bottom: 14px;
    }
    .key-input::placeholder { color: rgba(255,255,255,0.25); }
    .key-input:focus { border-color: #b400ff; }
    .save-btn {
      width: 100%;
      background: #b400ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="glow" id="glow"></div>
  <canvas id="face" width="600" height="400"></canvas>
  <div class="name">SNOB</div>
  <div class="status" id="status">…</div>

  <div class="mic-wrap">
    <button class="mic-btn" id="micBtn" onclick="toggleListen()">🎤</button>
    <div class="mic-label" id="micLabel">Tippen</div>
  </div>

  <button class="gear" onclick="openSettings()">⚙</button>

  <!-- Settings -->
  <div class="overlay" id="overlay">
    <div class="card">
      <h2>Snob einrichten</h2>
      <p>Anthropic API-Key eingeben.<br>Wird nur lokal gespeichert.<br>
        <a href="https://console.anthropic.com/account/keys" target="_blank">→ Key holen</a>
      </p>
      <input class="key-input" type="password" id="keyInput" placeholder="sk-ant-..." />
      <button class="save-btn" onclick="saveKey()">Fertig</button>
    </div>
  </div>

<script>
/* ── CANVAS FACE ── */
const cv  = document.getElementById('face');
const ctx = cv.getContext('2d');

// polyfill
if (!ctx.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}

let fSpeaking = false;
let fThinking = false;
let fListening= false;
let blink = false, blinkT = 0;
let mOpen = 0, mPhase = 0;
let thinkP= 0, frame = 0;
// subtle eye movement
let eyeOx = 0, eyeOy = 0, eyeTx = 0, eyeTy = 0, eyeTimer = 0;

function drawFace(){
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);

  // face bg
  ctx.fillStyle='#111';
  ctx.roundRect(0,0,W,H,50);
  ctx.fill();

  // params
  const eyeY  = H*0.41;
  const lx    = W*0.31 + eyeOx;
  const rx    = W*0.69 + eyeOx;
  const eRx   = W*0.13;
  const eRy   = blink ? 3 : H*0.22;

  // glow effect on eyes when speaking
  if(fSpeaking){
    ctx.shadowColor='rgba(180,0,255,0.5)';
    ctx.shadowBlur=20;
  } else if(fListening){
    ctx.shadowColor='rgba(0,200,255,0.4)';
    ctx.shadowBlur=14;
  } else {
    ctx.shadowBlur=0;
  }

  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(lx, eyeY+eyeOy, eRx, eRy, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(rx, eyeY+eyeOy, eRx, eRy, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // mouth
  const mY = H*0.75;
  const mW = W*0.20;

  if(fThinking){
    // dots
    for(let i=0;i<3;i++){
      const b = Math.sin(thinkP+i*1.1)*6;
      ctx.fillStyle=`rgba(255,255,255,${0.4+Math.sin(thinkP+i*1.1)*0.3})`;
      ctx.beginPath();
      ctx.arc(W/2-16+i*16, mY+b, 5, 0, Math.PI*2);
      ctx.fill();
    }
  } else if(fSpeaking && mOpen>0.04){
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.ellipse(W/2, mY, mW, Math.max(4, H*0.11*mOpen), 0, 0, Math.PI*2);
    ctx.fill();
  } else {
    // smile
    ctx.strokeStyle='#fff';
    ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath();
    ctx.arc(W/2, mY-10, mW, 0.13*Math.PI, 0.87*Math.PI);
    ctx.stroke();
  }
}

(function loop(){
  frame++;
  // blink
  blinkT++;
  if(!blink && blinkT>200){ blink=true; setTimeout(()=>{blink=false;blinkT=0;},120); }
  // eye wander
  eyeTimer--;
  if(eyeTimer<=0){
    eyeTx=(Math.random()-0.5)*14;
    eyeTy=(Math.random()-0.5)*8;
    eyeTimer=120+Math.random()*120;
  }
  eyeOx+=(eyeTx-eyeOx)*0.05;
  eyeOy+=(eyeTy-eyeOy)*0.05;
  // mouth
  if(fSpeaking){ mPhase+=0.18; mOpen=(Math.sin(mPhase)+1)/2; }
  else { mOpen*=0.8; }
  if(fThinking) thinkP+=0.1;
  drawFace();
  requestAnimationFrame(loop);
})();

/* ── SETTINGS ── */
function saveKey(){
  const k=document.getElementById('keyInput').value.trim();
  if(!k.startsWith('sk-')){ alert('Kein gültiger Key (muss mit sk- beginnen)'); return; }
  localStorage.setItem('snob_key',k);
  document.getElementById('overlay').classList.add('hidden');
  greet();
}
function openSettings(){
  const k=localStorage.getItem('snob_key')||'';
  document.getElementById('keyInput').value=k;
  document.getElementById('overlay').classList.remove('hidden');
}
window.addEventListener('load',()=>{
  if(!localStorage.getItem('snob_key')) openSettings();
  else greet();
});

/* ── API ── */
const SYSTEM=`Du bist Snob — frech, charmant arrogant, kurz.
Antworte auf Deutsch oder Englisch je nach Sprache des Users.
Max 2 Sätze. Keine langen Reden.`;

async function ask(txt){
  const key=localStorage.getItem('snob_key');
  if(!key){ openSettings(); return null; }
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:120,
      system:SYSTEM,
      messages:[{role:'user',content:txt}]
    })
  });
  if(!r.ok) throw new Error('API '+r.status);
  return (await r.json()).content[0].text;
}

/* ── SPEECH ── */
function speak(txt, onDone){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='de-DE'; u.rate=1.05;
  u.onstart=()=>{ fSpeaking=true; setGlow(true); };
  u.onend=()=>{ fSpeaking=false; setGlow(false); if(onDone) onDone(); };
  fSpeaking=true; setGlow(true);
  window.speechSynthesis.speak(u);
}

function greet(){
  setStatus('');
  setTimeout(()=>{
    speak('Hey. Ich bin Snob. Was willst du wissen?');
  }, 600);
}

function setGlow(on){ document.getElementById('glow').classList.toggle('active',on); }
function setStatus(t,active=false){
  const el=document.getElementById('status');
  el.textContent=t;
  el.classList.toggle('active',active);
}

/* ── VOICE ── */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recog=null, listening=false;

if(SR){
  recog=new SR();
  recog.continuous=false; recog.interimResults=false; recog.lang='de-DE';
  recog.onresult=async(e)=>{
    const txt=e.results[0][0].transcript;
    stopListen();
    setStatus(txt);
    fThinking=true; setStatus('…',true);
    try{
      const reply=await ask(txt);
      fThinking=false;
      if(reply) speak(reply,()=>setStatus(''));
    } catch(err){
      fThinking=false;
      setStatus('Fehler :(');
      speak('Da ist was schiefgelaufen. Versuch es nochmal.');
    }
  };
  recog.onerror=()=>{ stopListen(); setStatus(''); };
  recog.onend=()=>{ if(listening) stopListen(); };
}

function toggleListen(){
  if(!recog){ setStatus('Chrome verwenden'); return; }
  if(listening){ stopListen(); return; }
  window.speechSynthesis.cancel();
  fSpeaking=false;
  recog.start();
  listening=true;
  fListening=true;
  document.getElementById('micBtn').classList.add('listening');
  document.getElementById('micLabel').textContent='Stopp';
  setStatus('Ich höre…',true);
}
function stopListen(){
  try{ recog.stop(); }catch(e){}
  listening=false; fListening=false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micLabel').textContent='Tippen';
}
</script>
</body>
</html>
