<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Snob</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:pointer;}
    canvas{position:fixed;top:0;left:0;width:100%;height:100%;}
    #hint{
      position:fixed;bottom:52px;left:50%;transform:translateX(-50%);
      color:rgba(255,255,255,0.18);font-size:11px;letter-spacing:4px;
      text-transform:uppercase;font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      pointer-events:none;transition:opacity 1.2s;
    }
    #status{
      position:fixed;bottom:78px;left:50%;transform:translateX(-50%);
      color:rgba(180,80,255,0.8);font-size:13px;letter-spacing:1px;
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      pointer-events:none;text-align:center;width:280px;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">BERÜHREN</div>
<div id="status"></div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,3);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
window.addEventListener('resize',resize);

/* ── STATE ── */
let fSpeak=false,fListen=false,fThink=false;
let mOpen=0,mPhase=0,thinkP=0,frame=0;
let lEyeY=1,rEyeY=1; // wink scale
let eyeOx=0,eyeOy=0,eyeTx=0,eyeTy=0,eyeWand=0;
let tongueV=0,tongueT=0; // tongue visibility & target
let glowA=0,glowR=180,glowG=0,glowB=255;
let exprTimer=180,busy=false;
let greeted=false;

/* ── ANIM QUEUE ── */
const anims=[];
function anim(ms,fn,done){anims.push({s:Date.now(),ms,fn,done});}
function tickAnims(){
  const now=Date.now();
  for(let i=anims.length-1;i>=0;i--){
    const a=anims[i],p=Math.min(1,(now-a.s)/a.ms);
    a.fn(p);
    if(p>=1){if(a.done)a.done();anims.splice(i,1);}
  }
}
const eio=t=>t<.5?2*t*t:1-((-2*t+2)**2)/2;
const eo=t=>1-(1-t)**3;

/* ── EXPRESSIONS ── */
function wink(side){
  if(busy)return;busy=true;
  const set=v=>{if(side==='L')lEyeY=v;else rEyeY=v;};
  anim(140,p=>set(1-p),()=>anim(300,()=>{},()=>anim(140,p=>set(p),()=>{if(side==='L')lEyeY=1;else rEyeY=1;busy=false;})));
}
function tongue(){
  if(busy)return;busy=true;
  anim(200,p=>{tongueV=p;mOpen=p*0.35;},()=>anim(700,()=>{},()=>anim(220,p=>{tongueV=1-p;mOpen=(1-p)*0.35;},()=>{tongueV=0;mOpen=0;busy=false;})));
}
function squint(){
  if(busy)return;busy=true;
  anim(180,p=>{lEyeY=1-p*.72;rEyeY=1-p*.72;},()=>anim(500,()=>{},()=>anim(180,p=>{lEyeY=.28+p*.72;rEyeY=.28+p*.72;},()=>{lEyeY=1;rEyeY=1;busy=false;})));
}
function eyeRoll(){
  if(busy)return;busy=true;
  const r=H*.045;
  anim(900,p=>{const a=p*Math.PI*2-Math.PI/2;eyeTx=Math.cos(a)*r;eyeTy=Math.sin(a)*r;},()=>{eyeTx=0;eyeTy=0;busy=false;});
}
function surprise(){
  if(busy)return;busy=true;
  anim(130,p=>{lEyeY=1+p*.45;rEyeY=1+p*.45;},()=>anim(350,()=>{},()=>anim(180,p=>{lEyeY=1.45-p*.45;rEyeY=1.45-p*.45;},()=>{lEyeY=1;rEyeY=1;busy=false;})));
}
function sassy(){
  // one eye bigger, one smaller — smug look
  if(busy)return;busy=true;
  anim(200,p=>{lEyeY=1+p*.3;rEyeY=1-p*.5;},()=>anim(600,()=>{},()=>anim(200,p=>{lEyeY=1.3-p*.3;rEyeY=.5+p*.5;},()=>{lEyeY=1;rEyeY=1;busy=false;})));
}
function lookAway(){
  if(busy)return;busy=true;
  const dir=(Math.random()>.5?1:-1)*W*.06;
  anim(200,p=>{eyeTx=p*dir;},()=>anim(800,()=>{},()=>anim(200,p=>{eyeTx=dir*(1-p);},()=>{eyeTx=0;busy=false;})));
}
const EXPRS=[()=>wink('L'),()=>wink('R'),tongue,squint,eyeRoll,surprise,sassy,lookAway];

/* ── DRAW ── */
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  // radial glow
  if(glowA>.01){
    const g=ctx.createRadialGradient(W/2,H*.4,0,W/2,H*.4,W*.65);
    g.addColorStop(0,`rgba(${glowR},${glowG},${glowB},${glowA*.3})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }

  // ── EYES ──
  const eY=H*.36, lx=W*.30+eyeOx, rx=W*.70+eyeOx, oY=eyeOy;
  const eRx=W*.145, eRyBase=H*.195;
  const lRy=eRyBase*lEyeY, rRy=eRyBase*rEyeY;

  if(fSpeak){ctx.shadowColor='rgba(180,0,255,.7)';ctx.shadowBlur=28;}
  else if(fListen){ctx.shadowColor='rgba(0,200,255,.6)';ctx.shadowBlur=22;}
  else{ctx.shadowBlur=0;}

  ctx.fillStyle='#fff';
  if(lRy>1.5){ctx.beginPath();ctx.ellipse(lx,eY+oY,eRx,lRy,0,0,Math.PI*2);ctx.fill();}
  if(rRy>1.5){ctx.beginPath();ctx.ellipse(rx,eY+oY,eRx,rRy,0,0,Math.PI*2);ctx.fill();}
  ctx.shadowBlur=0;

  // ── MOUTH ──
  const mY=H*.72, mW=W*.17;

  if(fThink){
    for(let i=0;i<3;i++){
      const b=Math.sin(thinkP+i*1.15)*6;
      ctx.fillStyle=`rgba(255,255,255,${.3+Math.sin(thinkP+i*1.15)*.25})`;
      ctx.beginPath();ctx.arc(W/2-15+i*15,mY+b,5,0,Math.PI*2);ctx.fill();
    }
  } else if(tongueV>.05){
    const tO=Math.max(mOpen,0.3);
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(W/2,mY,mW*.85,H*.06*tO,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff6b9d';
    ctx.shadowColor='rgba(255,80,140,0.5)';ctx.shadowBlur=16;
    ctx.beginPath();ctx.ellipse(W/2,mY+H*.06*tO+H*.05*tongueV,mW*.45,H*.06*tongueV,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  } else if(fSpeak&&mOpen>.04){
    ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(255,255,255,.15)';ctx.shadowBlur=10;
    ctx.beginPath();ctx.ellipse(W/2,mY,mW,Math.max(3,H*.115*mOpen),0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  } else {
    ctx.strokeStyle='#fff';
    ctx.lineWidth=Math.max(4,W*.009);ctx.lineCap='round';
    ctx.shadowColor='rgba(255,255,255,.12)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(W/2,mY-H*.025,mW,.12*Math.PI,.88*Math.PI);ctx.stroke();
    ctx.shadowBlur=0;
  }
}

/* ── LOOP ── */
(function loop(){
  frame++;
  tickAnims();
  if(fSpeak){mPhase+=.16;mOpen=(Math.sin(mPhase)+1)/2*(0.5+Math.random()*.5);}
  else if(!tongueV){mOpen*=.8;}
  if(fThink)thinkP+=.1;
  eyeWand--;
  if(eyeWand<=0){eyeTx=(Math.random()-.5)*W*.04;eyeTy=(Math.random()-.5)*H*.025;eyeWand=80+Math.random()*120;}
  eyeOx+=(eyeTx-eyeOx)*.05;eyeOy+=(eyeTy-eyeOy)*.05;
  const tGlow=fSpeak?.9:fListen?.75:0;
  glowA+=(tGlow-glowA)*.08;
  if(fSpeak){glowR=180;glowG=0;glowB=255;}else{glowR=0;glowG=180;glowB=255;}
  if(!busy&&!fSpeak&&!fListen&&!fThink&&greeted){
    exprTimer--;
    if(exprTimer<=0){exprTimer=180+Math.random()*250;EXPRS[Math.floor(Math.random()*EXPRS.length)]();}
  }
  draw();
  requestAnimationFrame(loop);
})();

/* ── SNOB BRAIN ── */
const BRAIN=[
  {k:['hallo','hi ','hey ','servus','guten tag','guten morgen','grüß'],r:['Hallo. Ich hoffe du hast etwas Wichtiges zu sagen.','Hey. Kurz und gut, bitte.','Ah. Was verschafft mir die Ehre?']},
  {k:['was bist','wer bist','was ist snob','was ist gosnob','erklär','about','über'],r:['GoSNOB ist die exklusivste Lifestyle-Plattform. Nichts für jeden.','Ich bin Snob. GoSNOB ist der Ort für Leute mit Geschmack.','GoSNOB — exklusiv, stilvoll, nicht für die Masse.']},
  {k:['mitglied','member','beitreten','join','anmeld'],r:['Man wird nicht einfach Mitglied. Man wird ausgewählt.','Bewirbst du dich auf gosnob.com. Ob du genommen wirst — das entscheiden wir.']},
  {k:['preis','kosten','wie viel','günstig','teuer','cost'],r:['Wenn du als erstes nach dem Preis fragst — nicht die Zielgruppe.','Qualität hat ihren Preis. Wer das versteht, ist willkommen.']},
  {k:['produkt','kollektion','mode','fashion','kleidung'],r:['GoSNOB kuratiert das Beste. Nichts Mittelmäßiges.','Handverlesen, exklusiv, zeitlos. So wie wir.']},
  {k:['kontakt','contact','email','erreichen'],r:['Kontakt über gosnob.com — schnellster Weg zu uns.']},
  {k:['danke','thank','merci'],r:['Gern. So sollte es sein.','Du bist höflich. Das mag ich.']},
  {k:['tschüss','bye','ciao','auf wiedersehen'],r:['Auf Wiedersehen. Bleib stilvoll.','Ciao. War ein Vergnügen.']},
  {k:['wie geht','how are','alles gut'],r:['Ausgezeichnet. Snob ist immer ausgezeichnet.','Bestens. Ich bin schließlich Snob.']},
  {k:['witzig','lustig','witz','joke'],r:['Ich bin bereits der Witz und die Pointe gleichzeitig.','Mein Leben ist unterhaltsamer als jeder Witz.']},
  {k:['zunge','tongue','zeig'],r:['Du wolltest meine Zunge sehen? Na gut.']},
  {k:['zwink','wink','blink'],r:['Für dich mache ich eine Ausnahme.']},
  {k:['liebe','love','romantisch'],r:['Ich bin verliebt in guten Stil. Das reicht mir.']},
];
const FALLBACK=['Interessante Frage. Frag was über GoSNOB.','Das ist außerhalb meines Horizonts.','Hmm. Frag lieber über GoSNOB — da bin ich unschlagbar.','Keine Ahnung. Aber Stil? Den habe ich.'];

function snobReply(txt){
  const t=txt.toLowerCase();
  if(t.includes('zunge')||t.includes('tongue'))setTimeout(tongue,400);
  if(t.includes('zwink')||t.includes('wink'))setTimeout(()=>wink(Math.random()>.5?'L':'R'),200);
  for(const b of BRAIN)if(b.k.some(k=>t.includes(k)))return b.r[Math.floor(Math.random()*b.r.length)];
  return FALLBACK[Math.floor(Math.random()*FALLBACK.length)];
}

/* ── TTS ── */
function speak(txt,done){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='de-DE';u.rate=1.02;u.pitch=0.95;
  u.onstart=()=>{fSpeak=true;};
  u.onend=()=>{fSpeak=false;if(done)done();};
  fSpeak=true;window.speechSynthesis.speak(u);
}

/* ── GREETING ── */
function greet(){
  if(greeted)return;greeted=true;
  const h=document.getElementById('hint');h.style.opacity='0';
  surprise();
  setTimeout(()=>speak('Hey. Ich bin Snob. Frag mich alles über GoSNOB.'),400);
}

/* ── VOICE ── */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recog=null,listening=false;
if(SR){
  recog=new SR();
  recog.continuous=false;recog.interimResults=false;recog.lang='de-DE';
  recog.onresult=e=>{
    stopListen();
    fThink=true;
    const txt=e.results[0][0].transcript;
    document.getElementById('status').textContent='';
    setTimeout(()=>{fThink=false;speak(snobReply(txt));},500);
  };
  recog.onerror=()=>{stopListen();};
  recog.onend=()=>{if(listening)stopListen();};
}
function startListen(){
  if(!recog)return;
  window.speechSynthesis.cancel();fSpeak=false;
  recog.start();listening=true;fListen=true;
  document.getElementById('status').textContent='Ich höre…';
}
function stopListen(){
  try{recog.stop();}catch(e){}
  listening=false;fListen=false;
  document.getElementById('status').textContent='';
}

/* ── TAP ── */
function tap(){
  if(!greeted){greet();return;}
  if(fSpeak){window.speechSynthesis.cancel();fSpeak=false;return;}
  if(listening){stopListen();return;}
  startListen();
}
document.addEventListener('click',tap);
document.addEventListener('touchend',e=>{e.preventDefault();tap();},{passive:false});
</script>
</body>
</html>
